  --ink:#EAEDF4;
  --muted:#98A2B5;
  --line:#2A3345;
  --accent:#D3714F;
  --accent-ink:#24100A;
  --accent-soft:rgba(211,113,79,.14);
  --sky:#8FB0E3;
  --sky-soft:rgba(143,176,227,.14);
  --ribbon:#D3714F;
  --ribbon-soft:rgba(211,113,79,.14);
  --ok:#5BC08A;
  --ok-soft:rgba(91,192,138,.14);
  --bad:#E4657C;
  --bad-soft:rgba(228,101,124,.14);
  --extra:#D9A94C;
  --hl:#6E5A17;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 14px 34px -18px rgba(0,0,0,.65);
  --shadow-lg:0 2px 4px rgba(0,0,0,.4),0 22px 52px -20px rgba(0,0,0,.75);
}
body.large{ --read-size:1.58rem; }

/* ============ base ============ */
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
@media (prefers-reduced-motion:reduce){ html{scroll-behavior:auto} *,*::before,*::after{transition:none!important;animation:none!important} }
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-ui);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
h1,h2,h3{font-family:var(--font-display);font-weight:700;letter-spacing:-.02em;margin:0}
h1{font-size:clamp(1.85rem,5.5vw,2.6rem);line-height:1.12}
h2{font-family:var(--font-ui);font-size:.8rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:30px 0 12px;display:flex;align-items:center;gap:8px}
h3{letter-spacing:-.01em}
p{margin:.4em 0}
a{color:var(--sky)}
button{font-family:inherit;font-size:inherit;color:inherit;touch-action:manipulation}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--ink);background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;outline:none;max-width:100%}
input:focus-visible,textarea:focus-visible,select:focus-visible{border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-soft)}
textarea{resize:vertical;line-height:1.6}
:focus-visible{outline:2px solid var(--sky);outline-offset:2px}
::selection{background:var(--hl)}
.wrap{max-width:920px;margin:0 auto;padding:18px 18px 96px}
.hidden{display:none!important}
.mut{color:var(--muted)}
.small{font-size:.87rem}
svg.ic{width:1.1em;height:1.1em;vertical-align:-.18em;flex:none}

/* ============ topbar with rainbow hairline ============ */
.topbar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar .in{max-width:920px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:12px 18px}
.brand{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:12px}
.brand .mark{width:30px;height:30px;border-radius:9px;background:var(--accent);position:relative;flex:none;box-shadow:var(--shadow)}
.brand .mark::after{content:"";position:absolute;inset:4px;background:#fff;clip-path:polygon(50% 4%,74% 44%,62% 44%,62% 96%,38% 96%,38% 44%,26% 44%)}
.brand .name{font-family:var(--font-display);font-weight:700;font-size:1.02rem;letter-spacing:.1em}
.topbar .spacer{flex:1}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;border:1.5px solid var(--line);background:var(--surface);font-weight:600;font-size:.88rem}
.chip.flame{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 35%,var(--line));background:var(--accent-soft)}

/* ============ buttons ============ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid var(--line);background:var(--surface);border-radius:13px;padding:10px 17px;min-height:42px;cursor:pointer;font-weight:600;font-size:.95rem;transition:background .15s,border-color .15s,transform .06s,box-shadow .15s}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.985)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);box-shadow:var(--shadow)}
.btn.primary:hover{filter:brightness(1.06)}
.btn.big{padding:14px 24px;font-size:1.03rem;border-radius:16px;min-height:50px}
.btn.ghost{background:transparent}
.btn.icon{padding:9px;border-radius:12px;line-height:0;min-height:0}
.btn.danger{color:var(--bad)}
.btn.danger.confirming{background:var(--bad);border-color:var(--bad);color:#fff}
.btn:disabled{opacity:.45;cursor:default}
.btn.sm{padding:8px 13px;font-size:.88rem;border-radius:11px;min-height:38px}

/* segmented control */
.seg{display:inline-flex;flex-wrap:wrap;gap:4px;background:var(--surface2);border:1.5px solid var(--line);border-radius:14px;padding:4px}
.seg button{border:none;background:transparent;padding:8px 14px;border-radius:10px;cursor:pointer;font-weight:600;font-size:.9rem;color:var(--muted);white-space:nowrap}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* ============ cards ============ */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.card+.card{margin-top:14px}

/* ============ dashboard ============ */
.hero{position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:14px;min-height:340px;padding:150px 24px 24px;border-radius:24px;border:1px solid var(--line);box-shadow:var(--shadow-lg);
  background-image:linear-gradient(180deg,rgba(244,246,250,0) 26%,rgba(255,255,255,.66) 55%,rgba(255,255,255,.97) 78%),var(--church);
  background-size:cover;background-position:center 24%}
[data-theme="dark"] .hero{background-image:linear-gradient(180deg,rgba(13,17,26,.18) 22%,rgba(16,21,32,.72) 55%,rgba(24,30,42,.97) 78%),var(--church)}
.hero>*{position:relative}
.hero .sub{color:var(--muted);max-width:46ch;margin-top:10px;font-size:1.02rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:18px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:var(--shadow)}
.stat .n{font-family:var(--font-display);font-size:1.75rem;font-weight:700;letter-spacing:-.02em;line-height:1.1;display:flex;align-items:center;gap:8px}
.stat .l{color:var(--muted);font-size:.85rem;font-weight:500;margin-top:3px}
.stat.due .n{color:var(--accent)}
.continue{display:flex;align-items:center;gap:10px;width:100%;margin-top:16px;cursor:pointer;text-align:left;border-left:4px solid var(--sky)}
.continue b{font-family:var(--font-display);font-weight:600}
.continue .arr{margin-left:auto;color:var(--sky)}
.duelist{display:flex;flex-direction:column;gap:9px}
.duerow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;padding:12px 15px;box-shadow:var(--shadow)}
.duerow .t{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:13px}
.pcard{display:flex;flex-direction:column;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:17px;box-shadow:var(--shadow)}
.pcard .top{display:flex;align-items:center;gap:8px}
.tag{font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--sky);background:var(--sky-soft);border-radius:999px;padding:3px 10px}
.tag.new{color:var(--muted);background:var(--surface2)}
.tag.due{color:var(--accent);background:var(--accent-soft)}
.pcard h3{font-size:1.1rem;line-height:1.3}
.pcard .snip{font-family:var(--font-read);color:var(--muted);font-size:.98rem;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.meter{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden}
.meter i{display:block;height:100%;background:var(--accent);border-radius:99px}
.pcard .mrow{display:flex;align-items:center;justify-content:space-between;font-size:.84rem;color:var(--muted)}
.pcard .foot{display:flex;gap:8px;margin-top:2px}
.pcard .foot .btn:first-child{flex:1}
.badges{display:flex;flex-wrap:wrap;gap:9px}
.badge{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);border-radius:999px;padding:8px 15px;font-size:.88rem;font-weight:600;background:var(--surface)}
.badge.earned{border-color:color-mix(in srgb,var(--ok) 45%,var(--line));background:var(--ok-soft);color:var(--ok)}
.badge.locked{color:var(--muted);opacity:.6}
.empty{padding:38px 22px;text-align:center;border-style:dashed}
.empty h3{font-size:1.25rem;margin-bottom:6px}
.foot-note{margin-top:36px;color:var(--muted);font-size:.85rem;text-align:center}
.backuprow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}

/* ============ editor ============ */
.crumbs{display:flex;align-items:center;gap:8px;margin:14px 0 12px;color:var(--muted)}
.fld{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.fld label{font-weight:600;font-size:.9rem}
.fld .hint{color:var(--muted);font-size:.84rem}
.frow{display:flex;gap:12px;flex-wrap:wrap}
.frow .fld{flex:1;min-width:180px}
#edText,#edCustom{font-family:var(--font-read);font-size:1.12rem;min-height:220px}
.chunkprev{display:flex;flex-direction:column;gap:8px;max-height:330px;overflow:auto;padding:2px}
.chline{display:flex;gap:10px;background:var(--surface2);border-radius:12px;padding:10px 13px;font-family:var(--font-read);font-size:1.02rem;line-height:1.5}
.chline .num{font-family:var(--font-ui);font-size:.76rem;font-weight:700;color:var(--sky);padding-top:4px;min-width:20px;text-align:right}
.savebar{position:sticky;bottom:0;display:flex;gap:10px;justify-content:flex-end;padding:14px 0 max(14px,env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 35%)}

/* ============ practice ============ */
.phead{display:flex;align-items:center;gap:12px;margin:16px 0 4px;flex-wrap:wrap}
.phead h1{font-size:clamp(1.35rem,4vw,1.8rem);flex:1;min-width:200px}
.mchip{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:.9rem;background:var(--surface);border:1.5px solid var(--line);border-radius:999px;padding:8px 14px}
.mchip .meter{width:64px}
.weakline{color:var(--muted);font-size:.88rem;margin:2px 0 4px}
.weakline b{color:var(--ink);font-family:var(--font-read)}
.tabs{display:flex;gap:7px;overflow-x:auto;padding:12px 2px;position:sticky;top:58px;z-index:20;background:linear-gradient(var(--bg) 78%,transparent);scrollbar-width:none;scroll-snap-type:x proximity}
.tabs::-webkit-scrollbar{display:none}
.tab{border:1.5px solid var(--line);background:var(--surface);border-radius:999px;padding:9px 17px;min-height:40px;cursor:pointer;font-weight:600;font-size:.92rem;white-space:nowrap;color:var(--muted);scroll-snap-align:start}
.tab.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);box-shadow:var(--shadow)}
.panel{margin-top:8px}
.modehint{color:var(--muted);font-size:.9rem;margin:0 0 12px}

/* reading surface */
.ptext{font-family:var(--font-read);font-size:var(--read-size);line-height:1.85;max-width:66ch}
.ptext .chunk{padding:7px 13px 7px 16px;margin:3px 0;border-left:3px solid transparent;border-radius:12px;transition:background .2s,border-color .2s}
.ptext .chunk.cur{background:var(--sky-soft);border-left-color:var(--sky)}
.word{border-radius:6px;padding:1px 1px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.word.hl{background:var(--hl)}
.hw{display:inline-block;min-width:var(--w,3ch);border-bottom:2px dotted var(--muted);border-radius:4px;cursor:pointer;text-align:left;color:var(--muted);line-height:1.15;background:transparent}
.hw:hover{background:var(--surface2)}
.hw.rev{border-bottom-color:var(--sky);color:var(--ink);background:var(--sky-soft)}
.fltext{font-family:var(--font-read);font-size:calc(var(--read-size)*1.12);line-height:2;letter-spacing:.18em;max-width:66ch;white-space:pre-wrap}

/* listen: floating bottom playbar */
.playbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom));z-index:40;display:flex;align-items:center;justify-content:center;gap:14px;width:min(560px,calc(100% - 26px));padding:12px 16px;background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow-lg)}
.playspacer{height:112px}
.ctrls{display:flex;align-items:center;justify-content:center;gap:14px}
.cbtn{width:50px;height:50px;border-radius:50%;border:1.5px solid var(--line);background:var(--surface);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,transform .06s}
.cbtn:hover{background:var(--surface2)}
.cbtn:active{transform:scale(.94)}
.cbtn.big{width:68px;height:68px;background:var(--accent);border-color:var(--accent);color:var(--accent-ink);box-shadow:var(--shadow)}
.cbtn.big:hover{filter:brightness(1.06)}
.cbtn svg.ic{width:1.4em;height:1.4em;vertical-align:0}
.cbtn.big svg.ic{width:1.75em;height:1.75em}
.optrow{display:flex;flex-wrap:wrap;gap:12px 18px;align-items:center;justify-content:center;font-size:.9rem}
.optrow label{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-weight:600}
.optrow select{padding:8px 10px;border-radius:11px}
.switch{position:relative;width:44px;height:26px;appearance:none;background:var(--surface2);border:1.5px solid var(--line);border-radius:99px;cursor:pointer;transition:background .15s;margin:0}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:var(--muted);transition:transform .15s,background .15s}
.switch:checked{background:var(--ok);border-color:var(--ok)}
.switch:checked::after{transform:translateX(18px);background:#fff}
.ttswarn{border-left:4px solid var(--accent)}

/* blanks + type */
.bl{font-family:var(--font-read);font-size:inherit;padding:2px 4px;border:none;border-bottom:2px dotted var(--muted);border-radius:6px 6px 0 0;background:transparent;text-align:center}
.bl:focus-visible{border-bottom-color:var(--sky);box-shadow:none;background:var(--sky-soft)}
.bl.ok{border-bottom-color:var(--ok);color:var(--ok);background:var(--ok-soft)}
.bl.bad{border-bottom-color:var(--bad);color:var(--bad);background:var(--bad-soft)}
.corr{color:var(--ok);font-size:.85em;margin-left:4px}
#typeBox{font-family:var(--font-read);font-size:1.14rem;min-height:180px;width:100%}
.scorebar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.scoreN{font-family:var(--font-display);font-size:2.5rem;font-weight:700;letter-spacing:-.03em;line-height:1}
.scoreN.good{color:var(--ok)}.scoreN.mid{color:var(--extra)}.scoreN.low{color:var(--bad)}
.legend{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:.85rem}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.dw{border-radius:5px;padding:1px 2px}
.dw.miss{background:var(--bad-soft);color:var(--bad);text-decoration:underline dotted}
.dw.okw{color:var(--ok)}
.dw.extra{background:color-mix(in srgb,var(--extra) 16%,transparent);color:var(--extra);text-decoration:line-through}
.wchips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.wchip{font-family:var(--font-read);background:var(--bad-soft);color:var(--bad);border-radius:999px;padding:4px 12px;font-size:.95rem}

/* chain */
.chainbar{height:9px;background:var(--surface2);border-radius:99px;overflow:hidden;margin:8px 0 14px}
.chainbar i{display:block;height:100%;background:var(--accent);transition:width .25s}
.steplabel{font-family:var(--font-display);font-size:1.22rem;font-weight:700;letter-spacing:-.01em}
.chainbtns{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:16px}

/* flashcards */
.fcard{min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;cursor:pointer;font-family:var(--font-read);font-size:1.3rem;line-height:1.7;padding:28px}
.fcard .side{max-width:56ch}
.fcard .flip{color:var(--muted);font-family:var(--font-ui);font-size:.82rem;font-weight:600}
.rateb{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.rateb .btn{min-width:78px}

/* first letters */
.flnav{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:12px}
.peekbox{margin-top:12px;padding:14px 17px;background:var(--surface2);border-radius:14px;font-family:var(--font-read);font-size:1.1rem;line-height:1.7}

/* ============ focus overlay: night sky ============ */
.overlay{position:fixed;inset:0;z-index:60;background:linear-gradient(180deg,#0C111E 0%,#141C2E 60%,#1B2438 100%);color:#EDF0F7;display:flex;flex-direction:column;padding:max(18px,env(safe-area-inset-top)) 18px max(26px,env(safe-area-inset-bottom))}
.overlay .otop{display:flex;justify-content:space-between;align-items:center}
.overlay .otitle{font-family:var(--font-ui);font-size:.82rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#8B96AC}
.overlay .otext{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;font-family:var(--font-read);font-size:clamp(1.6rem,4.8vw,2.4rem);line-height:1.7;padding:10px;max-width:26ch;margin:0 auto}
.overlay .octrl{display:flex;align-items:center;justify-content:center;gap:22px}
.overlay .cbtn{background:#1D2536;border-color:#2C3854;color:#EDF0F7;width:60px;height:60px}
.overlay .cbtn.big{width:88px;height:88px;background:#D3714F;border-color:#D3714F;color:#24100A}
.overlay .btn{background:transparent;border-color:#2C3854;color:#EDF0F7}

/* ============ toast ============ */
#toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:14px;font-weight:600;font-size:.93rem;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:80;max-width:88vw;text-align:center;box-shadow:var(--shadow-lg)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* kbd hints */
.kbdhint{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;color:var(--muted);font-size:.8rem;margin-top:20px}
.kbd{border:1.5px solid var(--line);border-bottom-width:2.5px;border-radius:7px;background:var(--surface);padding:1px 8px;font-family:var(--font-ui);font-size:.78rem;font-weight:700}
@media (max-width:640px){.kbdhint{display:none}}
@media (max-width:520px){
  .wrap{padding:14px 14px 96px}
  .hero{min-height:300px;padding:130px 18px 18px;border-radius:20px}
  .card{padding:17px}
  .ptext{font-size:calc(var(--read-size)*0.94)}
  .stats{grid-template-columns:1fr 1fr}
  .playbar{gap:12px;padding:11px 14px}
  .cbtn{width:48px;height:48px}
  .cbtn.big{width:64px;height:64px}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="in">
    <button class="brand" data-act="home" title="By Heart home"><span class="mark"></span><span class="name">BY HEART</span></button>
    <span class="spacer"></span>
    <span class="chip flame" id="streakChip" title="Daily streak"></span>
    <button class="btn icon" id="sizeBtn" title="Toggle large text" aria-label="Toggle large text"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 18 9.5 5h1L16 18"/><path d="M6 14h7"/><path d="M15.5 18l3-7.5h.6l3 7.5"/></svg></button>
    <button class="btn icon" id="themeBtn" title="Toggle dark mode" aria-label="Toggle dark mode"></button>
  </div>
</header>

<main id="app"></main>

<div class="overlay hidden" id="focusOv" role="dialog" aria-label="Focus listening mode">
  <div class="otop">
    <span class="otitle" id="ovTitle">Focus mode</span>
    <button class="btn icon" id="ovClose" aria-label="Close focus mode"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
  </div>
  <div class="otext" id="ovText">Press play to begin.</div>
  <div class="octrl">
    <button class="cbtn" id="ovPrev" aria-label="Previous chunk"><svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h2v14H6zM20 5v14L9 12z"/></svg></button>
    <button class="cbtn big" id="ovPlay" aria-label="Play or pause"></button>
    <button class="cbtn" id="ovNext" aria-label="Next chunk"><svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M16 5h2v14h-2zM4 5v14l11-7z"/></svg></button>

  mode:'memory', mem:null, localOK:false, KEY:'byheart-data-v1',

/* ================= text utilities ================= */
const TOKRE=/(\n)|([\p{L}\p{N}][\p{L}\p{N}'\u2019\-]*)|([^\S\n]+)|([^\s])/gu;
function tokenize(t){
  const out=[];let m;TOKRE.lastIndex=0;
  while((m=TOKRE.exec(t))!==null){
    if(m[1])out.push({k:'br',x:'\n'});
    else if(m[2])out.push({k:'w',x:m[2]});
    else if(m[3])out.push({k:'s',x:m[3]});
    else out.push({k:'p',x:m[4]});
  }
  return out;
}
function wordsOf(t){return tokenize(t).filter(tk=>tk.k==='w').map(tk=>tk.x);}
function normWord(w,strict){return strict?w:w.toLowerCase().replace(/[^\p{L}\p{N}']/gu,'');}

function cleanText(t){
  t=String(t).replace(/\r\n?/g,'\n');
  t=t.replace(/[\t\u00a0]+/g,' ');
  t=t.replace(/[ ]{2,}/g,' ');
  t=t.replace(/ +\n/g,'\n').replace(/\n +/g,'\n');
  t=t.replace(/\n{3,}/g,'\n\n');
  // join wrapped lines: a line that does not end a sentence, followed by a lowercase continuation
  t=t.replace(/([^\n.!?\u2026:;"'\u201d\u2019)\]])\n(?=[a-z(\u201c"'])/g,'$1 ');
  t=t.replace(/ +([,.;:!?\u2026])/g,'$1');
  return t.trim();
}
function firstLetters(t){
  return tokenize(t).map(tk=>tk.k==='w'?tk.x[0]:tk.x).join('').replace(/[ ]{2,}/g,' ');
}
function splitParas(t){return t.split(/\n{2,}/).map(s=>s.trim()).filter(Boolean);}
function splitLines(t){return t.split(/\n+/).map(s=>s.trim()).filter(Boolean);}
function splitSentences(t){
  const out=[];
  for(const para of splitParas(t)){
    const flat=para.replace(/\n/g,' ');
    const m=flat.match(/[^.!?\u2026]+[.!?\u2026]+[\u201d\u2019"')\]]*|[^.!?\u2026]+$/g)||[flat];
    for(const s of m){const v=s.trim();if(v)out.push(v);}
  }
  return out;
}
function splitAfterCommas(s){
  const r=[];let buf='';
  for(let i=0;i<s.length;i++){
    buf+=s[i];
    if(/[,;:]/.test(s[i])&&s[i+1]===' '){r.push(buf.trim());buf='';i++;}
  }
  if(buf.trim())r.push(buf.trim());
  return r;
}
function splitPhrases(t){
  const out=[];
  for(const s of splitSentences(t)){
    if(wordsOf(s).length<=14){out.push(s);continue;}
    const bits=splitAfterCommas(s);
    let cur='';
    for(const b of bits){
      if(!cur)cur=b;
      else if(wordsOf(cur).length<4||wordsOf(b).length<3)cur+=' '+b;
      else{out.push(cur);cur=b;}
    }
    if(cur)out.push(cur);
  }
  return out;
}
function makeChunks(text,method,custom){
  switch(method){
    case 'phrase':return splitPhrases(text);
    case 'line':return splitLines(text);
    case 'para':return splitParas(text);
    case 'custom':return String(custom||'').split(/\n/).map(s=>s.trim()).filter(Boolean);
    default:return splitSentences(text);
  }
}
function suggestMethod(text){
  const lines=splitLines(text);
  if(lines.length>=4){
    const avg=lines.reduce((a,l)=>a+l.length,0)/lines.length;
    if(avg<65)return 'line';
  }
  return 'sentence';
}
/* ================= word diff (LCS) ================= */
function diffWords(a,b,strict){
  let A=a,B=b;
  if(A.length>1200)A=A.slice(0,1200);
  if(B.length>1400)B=B.slice(0,1400);
  const na=A.map(w=>normWord(w,strict)),nb=B.map(w=>normWord(w,strict));
  const m=A.length,n=B.length,W=n+1;
  const dp=new Uint16Array((m+1)*(n+1));
  for(let i=m-1;i>=0;i--){
    for(let j=n-1;j>=0;j--){
      dp[i*W+j]=(na[i]===nb[j])?dp[(i+1)*W+j+1]+1:Math.max(dp[(i+1)*W+j],dp[i*W+j+1]);
    }
  }
  const fa=new Array(a.length).fill(0),fb=new Array(b.length).fill(0);
  let i=0,j=0,match=0;
  while(i<m&&j<n){
    if(na[i]===nb[j]){fa[i]=1;fb[j]=1;match++;i++;j++;}
    else if(dp[(i+1)*W+j]>=dp[i*W+j+1])i++;
    else j++;
  }
  return {fa,fb,match};
}

/* ================= mastery, spaced repetition, streak, badges ================= */
const INTERVALS=[0,1,3,7,14,30];
function touchStreak(){
  const t=localDayStr(),s=DB.stats;
  if(s.lastDay===t)return;
  const y=localDayStr(new Date(Date.now()-DAY));
  s.streak=(s.lastDay===y)?s.streak+1:1;
  s.lastDay=t;
  save();checkBadges();updateHeader();
}
let clockStart=0;
function startClock(){clockStart=Date.now();}
function flushClock(){
  if(!clockStart)return;
  const d=clamp(Date.now()-clockStart,0,30*60000);
  DB.stats.seconds=(DB.stats.seconds||0)+Math.round(d/1000);
  clockStart=Date.now();
  save();
}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){if(clockStart)flushClock();}
  else if(VIEW&&VIEW.name==='practice'){clockStart=Date.now();}
});
function applyScore(p,score,mode){
  score=clamp(Math.round(score),0,100);
  p.history.push({t:Date.now(),m:mode,s:score});
  if(p.history.length>200)p.history.shift();
  p.mastery=clamp(Math.round((p.mastery||0)*0.6+score*0.4),0,100);
  if(!p.srs)p.srs={i:0,due:0};
  if(score>=90)p.srs.i=Math.min(INTERVALS.length-1,p.srs.i+1);
  else if(score>=70)p.srs.i=Math.max(p.srs.i,1);
  else p.srs.i=Math.max(0,p.srs.i-1);
  const base=new Date();base.setHours(0,0,0,0);
  p.srs.due=INTERVALS[p.srs.i]===0?Date.now()+4*3600e3:base.getTime()+INTERVALS[p.srs.i]*DAY;
  p.lastPracticed=Date.now();
  DB.stats.sessions++;
  if(score===100)DB.stats.perfect=(DB.stats.perfect||0)+1;
  touchStreak();flushClock();save();checkBadges();
}
function addWeak(p,words){
  for(const w of words){
    const k=normWord(w,false);
    if(!k||k.length<2)continue;
    p.weak[k]=(p.weak[k]||0)+1;
  }
  const keys=Object.keys(p.weak);
  if(keys.length>60){
    keys.sort((a,b)=>p.weak[a]-p.weak[b]);
    for(const k of keys.slice(0,keys.length-50))delete p.weak[k];
  }
  save();
}
function topWeak(p,n=6){
  return Object.entries(p.weak||{}).sort((a,b)=>b[1]-a[1]).slice(0,n);
}
function dueLabel(p){
  if(!p.lastPracticed)return 'New';
  const d=(p.srs&&p.srs.due)||0;
  if(!d)return 'Practice to schedule';
  const now=Date.now();
  if(d<=now)return 'Due now';
  if(localDayStr(new Date(d))===localDayStr())return 'Later today';
  if(localDayStr(new Date(d))===localDayStr(new Date(Date.now()+DAY)))return 'Tomorrow';
  return 'In '+Math.max(1,Math.round((d-now)/DAY))+' days';
}
function isDue(p){return !!(p.lastPracticed&&p.srs&&p.srs.due&&p.srs.due<=Date.now());}

const BADGES=[

/* ================= text to speech engine ================= */
const TTS={
  ok:('speechSynthesis' in window)&&('SpeechSynthesisUtterance' in window),
  voices:[],chunks:[],idx:0,rep:1,repLeft:1,state:'idle',_cancel:false,
  onchunk:null,onword:null,onstate:null,
  init(){
    if(!this.ok)return;
    const load=()=>{
      const v=speechSynthesis.getVoices()||[];
      if(v.length){this.voices=v;refreshVoiceSelect();}
    };
    load();
    try{speechSynthesis.onvoiceschanged=load;}catch(e){}
  },
  voice(){
    const uri=DB.prefs.voiceURI;
    let v=this.voices.find(x=>x.voiceURI===uri);
    if(!v)v=this.voices.find(x=>/^en/i.test(x.lang)&&x.default)||this.voices.find(x=>/^en/i.test(x.lang))||this.voices[0];
    return v||null;
  },
  start(chunks,at=0){
    if(!this.ok||!chunks.length)return;
    this.hardCancel();
    this.chunks=chunks;
    this.idx=clamp(at,0,chunks.length-1);
    this.rep=clamp(DB.prefs.repeat||1,1,5);
    this.repLeft=this.rep;
    this.state='playing';this.emit();
    this.speak();
  },
  speak(){
    if(this.idx>=this.chunks.length){
      if(DB.prefs.loop&&this.chunks.length){this.idx=0;this.repLeft=this.rep;}
      else{this.state='idle';this.emit();if(this.onchunk)this.onchunk(-1);return;}
    }
    const text=this.chunks[this.idx].replace(/\s+/g,' ').trim();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=clamp(DB.prefs.rate||1,0.5,2);
    const v=this.voice();if(v)u.voice=v;
    const ci=this.idx;
    u.onstart=()=>{if(this.onchunk)this.onchunk(ci);};
    u.onboundary=e=>{if(this.onword&&(e.name==='word'||typeof e.charIndex==='number'))this.onword(ci,e.charIndex||0);};
    u.onend=()=>{
      if(this._cancel)return;
      if(--this.repLeft>0){this.speak();}
      else{this.idx++;this.repLeft=this.rep;this.speak();}
    };
    u.onerror=()=>{
      if(this._cancel)return;
      this.idx++;this.repLeft=this.rep;this.speak();
    };
    speechSynthesis.speak(u);
  },
  toggle(startFn){
    if(!this.ok)return;
    if(this.state==='playing'){speechSynthesis.pause();this.state='paused';this.emit();}
    else if(this.state==='paused'){speechSynthesis.resume();this.state='playing';this.emit();}
    else if(startFn){startFn();}
  },
  jump(d){
    if(!this.chunks.length)return;
    this.hardCancel();
    this.idx=clamp(this.idx+d,0,this.chunks.length-1);
    this.repLeft=this.rep;
    this.state='playing';this.emit();
    setTimeout(()=>{this._cancel=false;this.speak();},80);
  },
  again(){this.jump(0);},
  hardCancel(){
    if(!this.ok)return;
    this._cancel=true;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(()=>{this._cancel=false;},60);
  },
  stop(){
    if(!this.ok)return;
    this.hardCancel();
    this.state='idle';this.emit();
    if(this.onchunk)this.onchunk(-1);
  },
  emit(){if(this.onstate)this.onstate(this.state);}
};

/* ================= elevenlabs engine ================= */
const ELKey={
  _mem:'',
  get(){try{return localStorage.getItem('byheart-elkey')||this._mem;}catch(e){return this._mem;}},
  set(k){this._mem=k;try{localStorage.setItem('byheart-elkey',k);}catch(e){}},
  clear(){this._mem='';try{localStorage.removeItem('byheart-elkey');}catch(e){}}
};
const ELDB={
  db:null,
  open(){
    return new Promise(res=>{
      if(this.db)return res(this.db);
      if(!('indexedDB' in window))return res(null);
      try{
        const rq=indexedDB.open('byheart-audio',1);
        rq.onupgradeneeded=()=>{rq.result.createObjectStore('clips');};
        rq.onsuccess=()=>{this.db=rq.result;res(this.db);};
        rq.onerror=()=>res(null);
      }catch(e){res(null);}
    });
  },
  req(mode,fn){
    return this.open().then(db=>{
      if(!db)return null;
      return new Promise(res=>{
        try{
          const r=fn(db.transaction('clips',mode).objectStore('clips'));
          r.onsuccess=()=>res(r.result===undefined?true:r.result);
          r.onerror=()=>res(null);
        }catch(e){res(null);}
      });
    });
  },
  get(key){return this.req('readonly',s=>s.get(key));},
  put(key,val){return this.req('readwrite',s=>s.put(val,key));},
  clear(){return this.req('readwrite',s=>s.clear());}
};
const EL={
  state:'idle',chunks:[],idx:0,rep:1,repLeft:1,
  audio:null,align:null,raf:0,lastChar:-1,curURL:'',token:0,fetching:false,voicesCache:null,
  onchunk:null,onword:null,onstate:null,onstatus:null,
  MODEL:'eleven_multilingual_v2',
  hasKey(){return !!ELKey.get();},
  voiceId(){return (DB&&DB.prefs.elVoice&&DB.prefs.elVoice.id)||'';},
  cacheKey(text){return this.voiceId()+'\u0001'+this.MODEL+'\u0001'+text;},
  status(msg){if(this.onstatus)this.onstatus(msg);},
  async api(path,opts){
    const r=await fetch('https://api.elevenlabs.io'+path,Object.assign({},opts,{
      headers:Object.assign({'xi-api-key':ELKey.get()},(opts&&opts.headers)||{})
    }));
    if(!r.ok){
      let msg='ElevenLabs error '+r.status;
      try{const j=await r.json();const d=j&&j.detail;if(d)msg=typeof d==='string'?d:(d.message||d.status||msg);}catch(e){}
      if(r.status===401)msg='ElevenLabs rejected that API key';
      const err=new Error(msg);err.status=r.status;throw err;
    }
    return r;
  },
  async listVoices(){
    const r=await this.api('/v1/voices');
    const j=await r.json();
    return (j.voices||[]).map(v=>({id:v.voice_id,name:v.name,category:v.category||'',preview:v.preview_url||''}));
  },
  async fetchClip(text){
    const body={text,model_id:this.MODEL,voice_settings:{stability:0.5,similarity_boost:0.75}};
    const r=await this.api('/v1/text-to-speech/'+encodeURIComponent(this.voiceId())+'/with-timestamps',{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json();
    const a=j.alignment||j.normalized_alignment||null;
    return {b64:j.audio_base64||'',align:a?{starts:a.character_start_times_seconds||[]}:null};
  },
  async ensureClip(text){
    const key=this.cacheKey(text);
    const hit=await ELDB.get(key);
    if(hit&&hit.b64)return hit;
    this.status('Generating audio...');
    const clip=await this.fetchClip(text);
    await ELDB.put(key,clip);
    this.status('');
    return clip;
  },
  async generateAll(p,onprog){
    let done=0,made=0;
    for(const raw of p.chunks){
      const text=raw.replace(/\s+/g,' ').trim();
      const hit=await ELDB.get(this.cacheKey(text));
      if(!hit||!hit.b64){
        const clip=await this.fetchClip(text);
        await ELDB.put(this.cacheKey(text),clip);
        made++;
      }
      done++;if(onprog)onprog(done,p.chunks.length);
    }
    return made;
  },
  start(chunks,at=0){
    if(!this.hasKey()||!this.voiceId())return;
    this.token++;this.cleanupAudio();
    this.chunks=chunks;this.idx=clamp(at,0,chunks.length-1);
    this.rep=clamp(DB.prefs.repeat||1,1,5);this.repLeft=this.rep;
    this.state='playing';this.emit();
    this.speak();
  },
  async speak(){
    const my=this.token;
    if(this.idx>=this.chunks.length){
      if(DB.prefs.loop&&this.chunks.length){this.idx=0;this.repLeft=this.rep;}
      else{this.state='idle';this.emit();if(this.onchunk)this.onchunk(-1);return;}
    }
    const ci=this.idx;
    const text=this.chunks[ci].replace(/\s+/g,' ').trim();
    let clip=null;
    this.fetching=true;
    try{clip=await this.ensureClip(text);}
    catch(e){
      this.fetching=false;
      if(my!==this.token)return;
      this.status('');this.state='idle';this.emit();
      toast((e&&e.message)||'ElevenLabs request failed');
      return;
    }
    this.fetching=false;
    if(my!==this.token)return;
    this.playClip(clip,ci);
  },
  playClip(clip,ci){
    this.cleanupAudio();
    let blob;
    try{
      const bin=atob(clip.b64);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
      blob=new Blob([bytes],{type:'audio/mpeg'});
    }catch(e){this.state='idle';this.emit();toast('Cached audio could not be decoded');return;}
    const url=URL.createObjectURL(blob);
    this.curURL=url;
    const a=new Audio(url);
    this.audio=a;this.align=clip.align;this.lastChar=-1;
    a.playbackRate=clamp(DB.prefs.rate||1,0.5,2);
    try{a.preservesPitch=true;}catch(e){}
    a.onplay=()=>{if(this.audio!==a)return;if(this.onchunk)this.onchunk(ci);this.tick(ci);};
    a.onended=()=>{
      if(this.audio!==a)return;
      if(--this.repLeft>0){a.currentTime=0;a.play().catch(()=>{});}
      else{this.idx++;this.repLeft=this.rep;this.speak();}
    };
    a.onerror=()=>{if(this.audio!==a)return;this.idx++;this.repLeft=this.rep;this.speak();};
    if(this.state==='paused')return;
    a.play().catch(()=>{this.state='idle';this.emit();toast('Tap play to start audio');});
  },
  tick(ci){
    cancelAnimationFrame(this.raf);
    const step=()=>{
      if(!this.audio||this.state!=='playing')return;
      const al=this.align;
      if(al&&al.starts&&al.starts.length&&this.onword){
        const t=this.audio.currentTime;
        let lo=0,hi=al.starts.length-1,i=0;
        while(lo<=hi){const mid=(lo+hi)>>1;if(al.starts[mid]<=t){i=mid;lo=mid+1;}else hi=mid-1;}
        if(i!==this.lastChar){this.lastChar=i;this.onword(ci,i);}
      }
      this.raf=requestAnimationFrame(step);
    };
    this.raf=requestAnimationFrame(step);
  },
  toggle(startFn){
    if(this.state==='playing'){
      if(this.audio)try{this.audio.pause();}catch(e){}
      cancelAnimationFrame(this.raf);
      this.state='paused';this.emit();
    }else if(this.state==='paused'){
      this.state='playing';this.emit();
      if(this.audio)this.audio.play().catch(()=>{});
      else if(!this.fetching)this.speak();
    }else if(startFn)startFn();
  },
  jump(d){
    if(!this.chunks.length)return;
    this.token++;this.cleanupAudio();
    this.idx=clamp(this.idx+d,0,this.chunks.length-1);
    this.repLeft=this.rep;
    this.state='playing';this.emit();
    this.speak();
  },
  again(){this.jump(0);},
  cleanupAudio(){
    cancelAnimationFrame(this.raf);
    if(this.audio){const a=this.audio;this.audio=null;a.onended=null;a.onerror=null;a.onplay=null;try{a.pause();}catch(e){}}
    if(this.curURL){try{URL.revokeObjectURL(this.curURL);}catch(e){}this.curURL='';}
    this.align=null;this.lastChar=-1;
  },
  stop(){
    this.token++;this.cleanupAudio();
    if(this.state!=='idle'){this.state='idle';this.emit();}
    if(this.onchunk)this.onchunk(-1);
  },
  emit(){if(this.onstate)this.onstate(this.state);}
};

function savePassage(){
  const title=ED.title.trim()||'Untitled passage';
  const text=ED.text.trim();
  if(!text){toast('Paste some text first');return;}
  const chunks=makeChunks(text,ED.method,ED.custom);
  if(!chunks.length){toast('No chunks found. Check the split method.');return;}
  let p;
  if(ED.id){
    p=findP(ED.id);
    const changed=p.text!==text||JSON.stringify(p.chunks)!==JSON.stringify(chunks);
    Object.assign(p,{title,category:ED.category.trim(),notes:ED.notes.trim(),text,method:ED.method,chunks});
    if(changed){
      const old=p.chunkStats||[];
      p.chunkStats=chunks.map((_,i)=>old[i]||{m:0});
    }
  }else{
    p={id:uid(),title,category:ED.category.trim(),notes:ED.notes.trim(),text,method:ED.method,chunks,
       chunkStats:chunks.map(()=>({m:0})),created:Date.now(),lastPracticed:0,mastery:0,srs:{i:0,due:0},history:[],weak:{}};
    DB.passages.unshift(p);
  }
  save();checkBadges();toast('Passage saved');
  go({name:'practice',id:p.id});
}

  TTS.onchunk=null;TTS.onword=null;
  if(PS.mode==='listen')panelListen(box,p);
  else if(PS.mode==='hide')panelHide(box,p);
  else if(PS.mode==='letters')panelLetters(box,p);
  else if(PS.mode==='blanks')panelBlanks(box,p);
  else if(PS.mode==='type')panelType(box,p);
  else if(PS.mode==='chain')panelChain(box,p);
  else panelCards(box,p);
}

/* ---------- listen ---------- */
function listenHTML(p){
  return p.chunks.map((c,ci)=>{
    const flat=c.replace(/\s+/g,' ').trim();
    let off=0;
    const inner=tokenize(flat).map(tk=>{
      const start=off;off+=tk.x.length;
      if(tk.k==='w')return `<span class="word" data-s="${start}">${esc(tk.x)}</span>`;
      return esc(tk.x);
    }).join('');
    return `<div class="chunk ${ci===PS.chunk?'cur':''}" data-ci="${ci}" role="button" tabindex="0">${inner}</div>`;
  }).join('');
}
function panelListen(box,p){

    ${canPlay?`<div class="playbar" role="group" aria-label="Playback controls">

    });
  };

    if(DB.prefs.engine==='eleven'){
      if(!EL.hasKey()){toast('Save your ElevenLabs key below first');return;}
      if(!EL.voiceId()){toast('Pick an ElevenLabs voice first');return;}
    }
    touchStreak();ENGINE().start(p.chunks,PS.chunk);
  };
  Listen.start=startPlayback;
  Listen.step=d=>{
    PS.chunk=clamp(PS.chunk+d,0,p.chunks.length-1);
    markChunk(PS.chunk);
    if(!$('#focusOv').classList.contains('hidden'))$('#ovText').textContent=p.chunks[PS.chunk].replace(/\s+/g,' ');
  };
  [TTS,EL].forEach(g=>{
    g.onchunk=ci=>{
      if(ci>=0)PS.chunk=ci;
      markChunk(ci);
      if(!$('#focusOv').classList.contains('hidden')){
        $('#ovText').textContent=ci<0?'Finished. Press play to hear it again.':p.chunks[ci].replace(/\s+/g,' ');
      }
    };
    g.onword=(ci,idx)=>{
      const el=document.querySelector('#listenText .chunk[data-ci="'+ci+'"]');
      if(!el)return;
      let target=null;
      el.querySelectorAll('.word').forEach(w=>{if(+w.dataset.s<=idx)target=w;});
      el.querySelectorAll('.word.hl').forEach(w=>w.classList.remove('hl'));
      if(target)target.classList.add('hl');
    };
    g.onstate=st=>{
      const ic=st==='playing'?icon('pause'):icon('play');
      const pb=$('#playBtn');if(pb)pb.innerHTML=ic;
      const op=$('#ovPlay');if(op)op.innerHTML=ic;
    };
  });
  EL.onstatus=msg=>{const st=$('#elStatus');if(st&&msg)st.textContent=msg;};
  ENGINE().onstate(ENGINE().state);

  if(canPlay){
    $('#playBtn').addEventListener('click',()=>ENGINE().toggle(startPlayback));
    $('#pvBtn').addEventListener('click',()=>{const g=ENGINE();g.state!=='idle'?g.jump(-1):Listen.step(-1);});
    $('#nxBtn').addEventListener('click',()=>{const g=ENGINE();g.state!=='idle'?g.jump(1):Listen.step(1);});
    $('#rpBtn').addEventListener('click',()=>{const g=ENGINE();g.state!=='idle'?g.again():startPlayback();});
    $('#focusBtn').addEventListener('click',()=>openFocus(p));
  }
  $('#engSel').addEventListener('change',e=>{
    stopAll();
    DB.prefs.engine=e.target.value;save();
    renderPanel();
  });
  $('#rateSel').addEventListener('change',e=>{
    DB.prefs.rate=Number(e.target.value);
    if(EL.audio)try{EL.audio.playbackRate=Number(e.target.value);}catch(err){}
    save();
  });
  $('#repSel').addEventListener('change',e=>{DB.prefs.repeat=Number(e.target.value);save();});
  const dvs=$('#voiceSel');
  if(dvs)dvs.addEventListener('change',e=>{DB.prefs.voiceURI=e.target.value;save();});
  $('#loopChk').addEventListener('change',e=>{DB.prefs.loop=e.target.checked;save();});
  $('#listenText').addEventListener('click',e=>{
    const c=e.target.closest('.chunk');if(!c)return;
    PS.chunk=+c.dataset.ci;
    const g=ENGINE();
    if(g.state!=='idle'){g.idx=PS.chunk;g.jump(0);}
    else markChunk(PS.chunk);
  });
  $('#listenText').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&e.target.classList.contains('chunk'))e.target.click();
  });
  if(useEL)wireELPanel(p);
}

let elPrevAudio=null;
async function loadELVoices(){
  const sel=$('#elVoiceSel');if(!sel)return;
  try{
    if(!EL.voicesCache)EL.voicesCache=await EL.listVoices();
    const cur=EL.voiceId();
    sel.innerHTML=EL.voicesCache.length
      ?EL.voicesCache.map(v=>`<option value="${escAttr(v.id)}" ${v.id===cur?'selected':''}>${esc(v.name)}</option>`).join('')

function wireELPanel(p){
  if(!$('#elPanel'))return;
  const keyIn=$('#elKey');
  if(keyIn){
    const saveKey=async()=>{
      const k=keyIn.value.trim();
      if(!k){toast('Paste your API key first');return;}
      $('#elStatus').textContent='Checking key...';
      ELKey.set(k);EL.voicesCache=null;
      try{EL.voicesCache=await EL.listVoices();toast('Key saved');renderPanel();}
      catch(err){ELKey.clear();$('#elStatus').textContent=(err&&err.message)||'That key did not work.';}
    };
    $('#elSaveKey').addEventListener('click',saveKey);
    keyIn.addEventListener('keydown',e=>{if(e.key==='Enter')saveKey();});
    return;
  }
  loadELVoices();
  $('#elVoiceSel').addEventListener('change',e=>{
    const v=(EL.voicesCache||[]).find(x=>x.id===e.target.value);
    if(v){stopAll();DB.prefs.elVoice={id:v.id,name:v.name};save();}
  });
  $('#elPrev').addEventListener('click',()=>{
    if(elPrevAudio){try{elPrevAudio.pause();}catch(e){}elPrevAudio=null;return;}
    const v=(EL.voicesCache||[]).find(x=>x.id===EL.voiceId());
    if(!v||!v.preview){toast('No preview available for this voice');return;}
    stopAll();
    elPrevAudio=new Audio(v.preview);
    elPrevAudio.onended=()=>{elPrevAudio=null;};
    elPrevAudio.play().catch(()=>{toast('Could not play the preview');elPrevAudio=null;});
  });
  $('#elGen').addEventListener('click',async()=>{
    if(!EL.voiceId()){toast('Pick a voice first');return;}
    const st=$('#elStatus'),btn=$('#elGen');
    btn.disabled=true;
    try{
      const made=await EL.generateAll(p,(d,t)=>{st.textContent='Generating chunk '+d+' of '+t+'...';});
      st.textContent=made?'Audio ready. Cached '+made+' new clip'+(made===1?'':'s')+' on this device.':'Audio was already cached for this voice.';
    }catch(err){st.textContent=(err&&err.message)||'Generation failed. Check the key, quota, and connection.';}
    btn.disabled=false;
  });
  $('#elClear').addEventListener('click',async()=>{await ELDB.clear();const st=$('#elStatus');if(st)st.textContent='Cached audio cleared.';});
  $('#elForget').addEventListener('click',()=>{ELKey.clear();EL.voicesCache=null;stopAll();renderPanel();toast('Key removed from this device');});
}

/* ---------- gradual hide ---------- */
function hideHTML(text,level){
  let wi=0;
  return tokenize(text).map(tk=>{
    if(tk.k==='br')return '<br>';
    if(tk.k!=='w')return esc(tk.x);
    const i=wi++;
    let hidden=false,fl=false;
    if(level===1)hidden=(i%3===2);
    else if(level===2)hidden=(i%2===1);
    else if(level===3){hidden=true;fl=true;}
    else if(level===4)hidden=true;
    if(!hidden)return '<span class="word">'+esc(tk.x)+'</span>';
    const w=Math.max(2,tk.x.length);
    return `<span class="hw" role="button" tabindex="0" data-w="${escAttr(tk.x)}" data-f="${fl?1:0}" style="--w:${w}ch" aria-label="hidden word">${fl?esc(tk.x[0]):'\u00a0'}</span>`;
  }).join('');
}
function panelHide(box,p){
  const levels=[['Full text',0],['Hide 1 of 3',1],['Hide 1 of 2',2],['First letters',3],['All hidden',4]];
  box.innerHTML=`
    <p class="modehint">Raise the level as recall gets easier. Tap any blank to peek at that word, or press <b>H</b> to peek at everything.</p>
    <div class="card"><div class="seg" id="hideSeg">${levels.map(l=>`<button data-l="${l[1]}" class="${PS.hide===l[1]?'on':''}">${l[0]}</button>`).join('')}</div></div>
    <div class="card"><div class="ptext" id="hideText"></div></div>`;
  const draw=()=>{$('#hideText').innerHTML=hideHTML(p.text,PS.peek?0:PS.hide);};
  $('#hideSeg').addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    PS.hide=Number(b.dataset.l);PS.peek=false;
    $$('#hideSeg button').forEach(x=>x.classList.toggle('on',x===b));
    draw();
  });
  draw();
}

/* ---------- fill in the blank ---------- */
function panelBlanks(box,p){
  const st=PS.blanks;
  box.innerHTML=`
    <p class="modehint">Type the missing words, then check. Missed words feed your tricky words list, so they show up more often.</p>
    <div class="card">
      <div class="optrow" style="justify-content:flex-start">
        <label>Difficulty <select id="blDiff">
          <option value="0.2">Easy &middot; 20% hidden</option>
          <option value="0.4">Medium &middot; 40%</option>
          <option value="0.6">Hard &middot; 60%</option>
          <option value="0.8">Extreme &middot; 80%</option>
        </select></label>
        <button class="btn sm" id="blNew">${icon('repeat')} New round</button>
        <button class="btn sm" id="blHintFL" title="Fill the first letter of the selected blank">First letter</button>
        <button class="btn sm" id="blHintRev" title="Reveal the selected blank (counts as a miss)">Reveal word</button>
      </div>
    </div>
    <div class="card"><div class="ptext" id="blText"></div></div>
    <div id="blResult"></div>
    <div style="margin-top:14px;text-align:center"><button class="btn primary big" id="blCheck">${icon('check')} Check answers</button></div>`;
  $('#blDiff').value=String(st.pct);
  let lastBlank=null,done=false;
  const build=()=>{
    done=false;
    const toks=tokenize(p.text),widx=[];
    toks.forEach((tk,i)=>{if(tk.k==='w')widx.push(i);});
    const k=Math.max(1,Math.round(widx.length*st.pct));
    const pool=[...widx],chosen=new Set();
    while(chosen.size<k&&pool.length){const j=Math.floor(Math.random()*pool.length);chosen.add(pool.splice(j,1)[0]);}
    $('#blText').innerHTML=toks.map((tk,i)=>{
      if(tk.k==='br')return '<br>';
      if(tk.k!=='w'||!chosen.has(i))return esc(tk.x);
      return `<input class="bl" data-a="${escAttr(tk.x)}" style="width:${Math.max(3,tk.x.length+1)}ch" autocapitalize="off" autocomplete="off" spellcheck="false" aria-label="missing word">`;
    }).join('');
    $('#blResult').innerHTML='';
    $('#blCheck').disabled=false;
    lastBlank=null;
  };
  $('#blText').addEventListener('focusin',e=>{if(e.target.classList.contains('bl'))lastBlank=e.target;});
  $('#blHintFL').addEventListener('click',()=>{
    if(!lastBlank||done)return toast('Tap a blank first');
    lastBlank.value=lastBlank.dataset.a[0];lastBlank.focus();
  });
  $('#blHintRev').addEventListener('click',()=>{
    if(!lastBlank||done)return toast('Tap a blank first');
    lastBlank.value=lastBlank.dataset.a;lastBlank.dataset.rev='1';lastBlank.focus();
  });
  $('#blNew').addEventListener('click',build);
  $('#blDiff').addEventListener('change',e=>{st.pct=Number(e.target.value);build();});
  $('#blCheck').addEventListener('click',()=>{
    const ins=$$('#blText .bl');
    if(!ins.length||done)return;
    let ok=0;const missed=[];
    ins.forEach(inp=>{
      const a=inp.dataset.a;
      const good=!inp.dataset.rev&&normWord(inp.value.trim(),false)===normWord(a,false);
      inp.classList.add(good?'ok':'bad');
      inp.disabled=true;
      if(good)ok++;
      else{missed.push(a);inp.insertAdjacentHTML('afterend','<span class="corr">'+esc(a)+'</span>');}
    });
    const score=Math.round(ok/ins.length*100);
    done=true;$('#blCheck').disabled=true;
    addWeak(p,missed);applyScore(p,score,'blanks');updatePHead(p);
    $('#blResult').innerHTML=resultCard(score,missed,'You filled '+ok+' of '+ins.length+' blanks.')
      +'<div style="text-align:center;margin-top:10px"><button class="btn" id="blAgain">Practice again</button></div>';
    $('#blAgain').addEventListener('click',build);
    $('#blResult').scrollIntoView({block:'nearest',behavior:SMOOTH});
  });
  build();
}

/* ---------- type from memory ---------- */
function renderDiffText(text,flags,kind){
  let wi=0;
  return tokenize(text).map(tk=>{
    if(tk.k==='br')return '<br>';
    if(tk.k!=='w')return esc(tk.x);
    const f=flags[wi++];
    const cls=f?'okw':(kind==='orig'?'miss':'extra');
    return '<span class="dw '+cls+'">'+esc(tk.x)+'</span>';
  }).join('');
}

        </div>

      </div>`;

/* ---------- chunk builder chain ---------- */
function chainSteps(n){
  const s=[];
  for(let i=0;i<n;i++){
    s.push({idxs:[i],label:'Learn chunk '+(i+1)});
    if(i>0)s.push({idxs:Array.from({length:i+1},(_,k)=>k),label:'Chunks 1 to '+(i+1)+' together'});
  }
  return s;
}
function panelChain(box,p){
  const st=PS.chain;
  const steps=chainSteps(p.chunks.length);
  if(!st.on){
    box.innerHTML=`<div class="card">
      <div class="steplabel">Build the chain</div>
      <p class="mut">Master chunk 1, then chunk 2, then say them together. Each new chunk joins the chain until you can carry the whole passage from the top.</p>
      <p class="mut small">${steps.length} steps for this passage.</p>
      <div class="chainbtns"><button class="btn primary big" id="chStart">Start the chain</button></div>
    </div>`;
    $('#chStart').addEventListener('click',()=>{
      Object.assign(st,{on:true,step:0,struggles:0,vis:'full',scored:false});
      touchStreak();renderPanel();
    });
    return;
  }
  if(st.step>=steps.length){
    const score=clamp(100-st.struggles*8,50,100);
    if(!st.scored){st.scored=true;applyScore(p,score,'chain');updatePHead(p);}
    box.innerHTML=resultCard(score,null,'Chain complete: '+steps.length+' steps, '+st.struggles+' peek'+(st.struggles===1?'':'s')+' needed.')
      +`<div style="text-align:center;margin-top:12px">
        <button class="btn primary" id="chRestart">Run the chain again</button>
        <button class="btn" data-act="home">Done for now</button>
      </div>`;
    $('#chRestart').addEventListener('click',()=>{
      Object.assign(st,{on:true,step:0,struggles:0,vis:'full',scored:false});
      renderPanel();
    });
    return;
  }
  const stepObj=steps[st.step];
  const text=stepObj.idxs.map(i=>p.chunks[i]).join('\n');
  const draw=()=>{
    const t=$('#chText');
    if(st.vis==='full')t.innerHTML='<span class="word">'+esc(text).replace(/\n/g,'</span><br><span class="word">')+'</span>';
    else if(st.vis==='fl')t.innerHTML='<span class="fltext" style="font-size:inherit">'+esc(firstLetters(text)).replace(/\n/g,'<br>')+'</span>';
    else t.innerHTML=hideHTML(text,4);
    $$('#chVis button').forEach(b=>b.classList.toggle('on',b.dataset.v===st.vis));
  };
  box.innerHTML=`
    <div class="card">
      <div class="mut small">Step ${st.step+1} of ${steps.length}</div>
      <div class="chainbar"><i style="width:${Math.round(st.step/steps.length*100)}%"></i></div>
      <div class="steplabel">${esc(stepObj.label)}</div>
      <p class="modehint" style="margin-top:6px">${stepObj.idxs.length>1?'Recite the whole chain from first letters, then check yourself.':'Read it, listen to it in your head, then hide it and say it.'}</p>
      <div class="seg" id="chVis" style="margin-top:6px">
        <button data-v="full">Full text</button>
        <button data-v="fl">First letters</button>
        <button data-v="hidden">Hidden</button>
      </div>
      <div class="ptext" id="chText" style="margin-top:14px"></div>
      <div class="chainbtns">
        <button class="btn" id="chStruggle">${icon('repeat')} I needed to look</button>
        <button class="btn primary" id="chGot">Got it ${icon('next')}</button>
      </div>
    </div>`;
  $('#chVis').addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    st.vis=b.dataset.v;draw();
  });
  $('#chStruggle').addEventListener('click',()=>{st.struggles++;st.vis='full';draw();});
  $('#chGot').addEventListener('click',()=>{
    st.step++;
    const nxt=steps[st.step];
    st.vis=nxt&&nxt.idxs.length>1?'fl':'full';
    renderPanel();
  });
  draw();
}

/* ---------- flashcards ---------- */
function panelCards(box,p){
  const st=PS.cards;
  if(!st.on){
    box.innerHTML=`<div class="card">
      <div class="steplabel">Flashcards</div>
      <p class="mut">Each chunk becomes a card. See the opening words, recall the rest out loud, flip, and rate yourself. Weakest chunks come first.</p>
      <div class="chainbtns"><button class="btn primary big" id="fcStart">Start &middot; ${p.chunks.length} card${p.chunks.length===1?'':'s'}</button></div>
    </div>`;
    $('#fcStart').addEventListener('click',()=>{
      Object.assign(st,{on:true,i:0,flip:false,ratings:[],scored:false});
      st.order=p.chunks.map((_,i)=>i).sort((a,b)=>((p.chunkStats[a]&&p.chunkStats[a].m)||0)-((p.chunkStats[b]&&p.chunkStats[b].m)||0));
      touchStreak();renderPanel();
    });
    return;
  }
  if(st.i>=st.order.length){
    const avg=st.ratings.length?Math.round(st.ratings.reduce((a,b)=>a+b,0)/st.ratings.length):0;
    if(!st.scored){st.scored=true;applyScore(p,avg,'cards');updatePHead(p);}
    box.innerHTML=resultCard(avg,null,st.order.length+' cards reviewed.')
      +'<div style="text-align:center;margin-top:12px"><button class="btn primary" id="fcAgain">Another round</button></div>';
    $('#fcAgain').addEventListener('click',()=>{Object.assign(st,{on:false});renderPanel();});
    return;
  }
  const ci=st.order[st.i],chunk=p.chunks[ci];
  const w=wordsOf(chunk);
  const nf=Math.min(5,Math.max(1,w.length-1));
  const front=w.length>1?w.slice(0,nf).join(' ')+' ...':'Recall this chunk';
  box.innerHTML=`
    <div class="mut small" style="text-align:center;margin-bottom:8px">Card ${st.i+1} of ${st.order.length} &middot; chunk ${ci+1}</div>
    <div class="card fcard" id="fcCard" role="button" tabindex="0">
      <div class="side">${st.flip?esc(chunk):esc(front)}</div>
      <div class="flip">${st.flip?'How well did you recall it?':'Tap to flip'}</div>
    </div>
    ${st.flip?`<div class="rateb">
      <button class="btn" data-r="35" style="color:var(--bad)">Again</button>
      <button class="btn" data-r="60" style="color:var(--extra)">Hard</button>
      <button class="btn" data-r="85" style="color:var(--ok)">Good</button>
      <button class="btn primary" data-r="100">Easy</button>
    </div>`:''}`;
  $('#fcCard').addEventListener('click',()=>{if(!st.flip){st.flip=true;renderPanel();}});
  $('#fcCard').addEventListener('keydown',e=>{if(e.key==='Enter'&&!st.flip){st.flip=true;renderPanel();}});
  $$('.rateb .btn').forEach(b=>b.addEventListener('click',()=>{
    const r=Number(b.dataset.r);
    const cs=p.chunkStats[ci]||(p.chunkStats[ci]={m:0});
    cs.m=Math.round((cs.m||0)*0.5+r*0.5);
    st.ratings.push(r);st.i++;st.flip=false;
    save();renderPanel();
  }));
}

/* ---------- shared result card ---------- */
function resultCard(score,missed,sub){
  const cls=score>=90?'good':score>=70?'mid':'low';
  const msg=score>=95?'Outstanding recall.'
    :score>=85?'Very strong. One more pass will lock it in.'
    :score>=70?'Good progress. Review the misses and go again.'
    :'Keep at it. Repetition is the whole game.';
  const uniq=missed?[...new Set(missed.map(w=>w.toLowerCase()))].slice(0,14):[];
  return `<div class="card" style="margin-top:14px">
    <div class="scorebar"><span class="scoreN ${cls}">${score}%</span>
      <div><div style="font-weight:600">${msg}</div><div class="mut small">${esc(sub||'')}</div></div>
    </div>
    ${uniq.length?'<div class="mut small">Missed words</div><div class="wchips">'+uniq.map(w=>'<span class="wchip">'+esc(w)+'</span>').join('')+'</div>':''}
  </div>`;
}

/* ================= focus mode overlay ================= */
function openFocus(p){
  $('#focusOv').classList.remove('hidden');
  $('#ovTitle').textContent=p.title;
  $('#ovText').textContent=(p.chunks[PS.chunk]||'').replace(/\s+/g,' ');
  document.body.style.overflow='hidden';
  const g=ENGINE();
  if(g.onstate)g.onstate(g.state);
  if(g.state==='idle'&&Listen.start)Listen.start();
}
function closeFocus(){
  const ov=$('#focusOv');
  if(!ov||ov.classList.contains('hidden'))return;
  ov.classList.add('hidden');
  document.body.style.overflow='';
}
$('#ovClose').addEventListener('click',closeFocus);
$('#ovPlay').addEventListener('click',()=>ENGINE().toggle(Listen.start));
$('#ovPrev').addEventListener('click',()=>{const g=ENGINE();g.state!=='idle'?g.jump(-1):(Listen.step&&Listen.step(-1));});
$('#ovNext').addEventListener('click',()=>{const g=ENGINE();g.state!=='idle'?g.jump(1):(Listen.step&&Listen.step(1));});

/* ================= keyboard shortcuts ================= */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeFocus();return;}
  const t=e.target;
  if(t&&(/INPUT|TEXTAREA|SELECT|BUTTON/.test(t.tagName)||t.isContentEditable))return;
  if(!DB||VIEW.name!=='practice'||!PS)return;
  const k=e.key.toLowerCase();
  if(e.key===' '){
    if(PS.mode==='listen'||!$('#focusOv').classList.contains('hidden')){e.preventDefault();ENGINE().toggle(Listen.start);}
  }else if(k==='r'){
    const g=ENGINE();
    if(g.state!=='idle')g.again();
    else if(PS.mode==='listen'&&Listen.start)Listen.start();
  }else if(k==='n'||k==='p'){
    const d=k==='n'?1:-1;
    if(PS.mode==='listen'){const g=ENGINE();g.state!=='idle'?g.jump(d):(Listen.step&&Listen.step(d));}
    else if(PS.mode==='letters'&&PS.fl.scope==='chunk'){
      const p=findP(PS.pid);
      PS.fl.idx=clamp(PS.fl.idx+d,0,p.chunks.length-1);PS.fl.peek=false;renderPanel();
    }else if(PS.mode==='chain'&&PS.chain.on&&k==='n'){
      const b=$('#chGot');if(b)b.click();
    }
  }else if(k==='h'){
    if(PS.mode==='hide'){PS.peek=!PS.peek;renderPanel();}
    else if(PS.mode==='letters'){PS.fl.peek=!PS.fl.peek;renderPanel();}
  }
});

/* ================= init ================= */
(async function init(){
  await Store.init();
  const loaded=await Store.load();
  DB=migrate(loaded||freshDB());
  if(!DB.seeded){
    seedSample();
    DB.seeded=true;
    for(const b of BADGES){if(b.test(DB)&&!DB.stats.earned.includes(b.id))DB.stats.earned.push(b.id);}
    Store.persist(DB);
  }
  document.documentElement.dataset.theme=DB.prefs.theme;
  document.body.classList.toggle('large',!!DB.prefs.large);
  $('#ovPlay').innerHTML=icon('play');
  TTS.init();
  render();
})();
</script>
